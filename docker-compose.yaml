services:
  web:
    container_name: shop_django
    build:
      context: .
    command: sh /app/entrypoint.sh
    expose:
      - 8000
    env_file:
      - .env
    volumes:
      - .:/app
      - back_media:/app/media
      - back_static:/app/static
    depends_on:
      - postgres
      - redis

  postgres:
    container_name: shop_postgres
    image: postgres:16
    environment:
      - POSTGRES_USER=${USER_DB}
      - POSTGRES_DB=${NAME_DB}
      - POSTGRES_PASSWORD=${PASSWORD_DB}
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    container_name: shop_redis
    image: redis:7
    volumes:
      - redis-data:/data

  celery_worker:
    container_name: shop_worker
    build:
      context: .
    command: celery -A shop_api worker --loglevel=INFO
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - .:/app

  celery_beat:
    build:
      context: .
    command: celery -A shop_api beat --loglevel=INFO
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - .:/app

  celery_flower:
    container_name: shop_flower
    build:
      context: .
    command: celery -A shop_api flower --port=5555
    ports:
      - "5556:5555"
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - .:/app

  nginx:
    image: nginx:latest
    container_name: shop_nginx
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - back_media:/app/media
      - back_static:/app/static

volumes:
  db-data:
  redis-data:
  back_media:
  back_static:
