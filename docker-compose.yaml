services:
  web:
    container_name: shop_django
    build:
      context: .
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "7001:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  postgres:
    container_name: shop_postgres
    image: postgres:16
    environment:
      - POSTGRES_USER=${USER_DB}
      - POSTGRES_DB=${NAME_DB}
      - POSTGRES_PASSWORD=${PASSWORD_DB}
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    container_name: shop_redis
    image: redis:7

  celery_worker:
    build:
      context: .
    command: celery -A shop_api worker --loglevel=INFO
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - .:/app

  celery_beat:
    build:
      context: .
    command: celery -A shop_api beat --loglevel=INFO
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - .:/app

  celery_flower:
    container_name: shop_flower
    build:
      context: .
    command: celery -A shop_api flower --port=5555
    ports:
      - "5556:5555"
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - .:/app

volumes:
  db-data:
  redis-data:
